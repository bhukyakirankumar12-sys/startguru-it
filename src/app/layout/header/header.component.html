<header
  class="header"
  [class.header--shadow]="scrolled()"
  role="banner"
>
  <div class="header__inner sg-container">
    <a class="brand" href="#top" (click)="closeMenu()">
      <span class="brand__mark" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="32" height="32" rx="10" fill="#2563EB" />
          <path
            d="M11 24V12h4.2l3.1 9.2h.1L21.5 12H26v12h-2.8v-8.3h-.1L19.8 24h-2.4l-3.5-8.3h-.1V24H11Z"
            fill="white"
          />
        </svg>
      </span>
      <span class="brand__text">
        <span class="brand__name">StarGuru IT</span>
        <span class="brand__tag">Build. Transform. Grow.</span>
      </span>
    </a>

    <button
      type="button"
      class="nav-toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="primary-navigation"
      (click)="toggleMenu()"
    >
      <span class="sr-only">Toggle navigation</span>
      <span class="nav-toggle__bars" aria-hidden="true"></span>
    </button>

    <nav
      id="primary-navigation"
      class="nav"
      [class.nav--open]="menuOpen()"
      aria-label="Primary"
    >
      <ul class="nav__list">
        @for (item of navItems; track item.label) {
          <li class="nav__item">
            <a class="nav__link" [href]="navLink(item)" (click)="closeMenu()">{{ item.label }}</a>
          </li>
        }
      </ul>
      <a class="btn btn--primary header__cta" href="#contact" (click)="closeMenu()">
        Schedule Consultation
        <span class="btn__chev" aria-hidden="true">→</span>
      </a>
    </nav>
  </div>
</header>
